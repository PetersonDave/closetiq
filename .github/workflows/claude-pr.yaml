name: Claude PR Generator

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  issues:
    types:
      - opened
      - labeled

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  create-pr:
    if: contains(github.event.issue.labels.*.name, 'claude')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Call Claude API
        run: |
          curl https://api.anthropic.com/v1/messages \
            -H "x-api-key: ${{ secrets.ANTHROPIC_API_KEY }}" \
            -H "anthropic-version: 2023-06-01" \
            -H "content-type: application/json" \
            -d "{
              \"model\": \"claude-sonnet-4-20250514\",
              \"max_tokens\": 2000,
              \"messages\": [{
                \"role\": \"user\",
                \"content\": \"Implement this issue:\\nTitle: ${{ github.event.issue.title }}\\nBody: ${{ github.event.issue.body }}\"
              }]
            }"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: claude/${{ github.event.issue.number }}
          title: "AI: ${{ github.event.issue.title }}"
          body: |
            Auto-generated from issue #${{ github.event.issue.number }}
          draft: true