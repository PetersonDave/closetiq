name: Claude PR Generator

on:
  issues:
    types:
      - opened
      - labeled

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  create-pr:
    if: contains(github.event.issue.labels.*.name, 'claude')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Run Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          claude-code --dangerously-skip-permissions "
          Read the repository and implement this issue.

          Title:
          ${ISSUE_TITLE}

          Description:
          ${ISSUE_BODY}

          Rules:
          - Follow the existing coding style
          - Keep changes minimal
          - Do not rewrite unrelated code
          - Use vanilla JavaScript only
          - Do not add frameworks
          "

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: claude/${{ github.event.issue.number }}
          title: "AI: ${{ github.event.issue.title }}"
          body: |
            Auto-generated from issue #${{ github.event.issue.number }}
          draft: true