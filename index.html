<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ClosetIQ">
<meta name="theme-color" content="#0f0e0d">
<meta name="description" content="AI-powered outfit suggestions based on your wardrobe and the weather">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>ClosetIQ</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --font-sans: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
  --font-serif: Georgia, 'Times New Roman', serif;
  --bg: #0f0e0d;
  --surface: #1a1917;
  --surface2: #252320;
  --border: rgba(255,255,255,0.08);
  --border-hover: rgba(255,255,255,0.16);
  --text: #f5f0e8;
  --text-muted: #8a8578;
  --text-dim: #5a5650;
  --accent: #c9a96e;
  --accent-dim: rgba(201,169,110,0.12);
  --accent-text: #f0d5a0;
  --danger: #e05a5a;
  --success: #6bbf8e;
  --radius: 12px;
  --radius-sm: 8px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
html { background: var(--bg); }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh; min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
.app {
  max-width: 430px; margin: 0 auto;
  min-height: 100vh; min-height: 100dvh;
  display: flex; flex-direction: column;
  padding-bottom: calc(80px + var(--safe-bottom));
}

/* Header */
header {
  padding: calc(16px + var(--safe-top)) 20px 14px;
  border-bottom: 0.5px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; background: var(--bg); z-index: 100;
}
.logo { font-family: var(--font-serif); font-size: 22px; color: var(--accent-text); letter-spacing: -0.3px; }
.logo em { font-style: italic; color: var(--text-muted); }
.weather-chip {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface); border: 0.5px solid var(--border);
  border-radius: 20px; padding: 6px 12px;
  font-size: 13px; color: var(--text-muted); cursor: pointer;
  transition: border-color 0.2s; -webkit-tap-highlight-color: transparent;
}
.weather-chip:active { border-color: var(--border-hover); }
.weather-chip .temp { color: var(--text); font-weight: 500; }

/* Sections */
section { padding: 20px; }
section + section { padding-top: 0; }
.section-label {
  font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text-dim); margin-bottom: 12px; font-weight: 500;
  display: flex; align-items: center; justify-content: space-between;
}
.section-label-left { display: flex; align-items: center; gap: 8px; }

/* Occasion */
.occasion-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.occasion-btn {
  background: var(--surface); border: 0.5px solid var(--border);
  border-radius: var(--radius-sm); padding: 10px 6px;
  cursor: pointer; text-align: center; transition: all 0.15s;
  font-family: var(--font-sans); -webkit-tap-highlight-color: transparent;
}
.occasion-btn:active { transform: scale(0.96); }
.occasion-btn.active { border-color: var(--accent); background: var(--accent-dim); }
.occasion-btn .icon { font-size: 20px; display: block; margin-bottom: 4px; }
.occasion-btn .label { font-size: 11px; color: var(--text-muted); display: block; }
.occasion-btn.active .label { color: var(--accent-text); }

/* Setting */
.setting-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.setting-btn {
  background: var(--surface); border: 0.5px solid var(--border);
  border-radius: var(--radius-sm); padding: 10px 6px;
  cursor: pointer; text-align: center; transition: all 0.15s;
  font-family: var(--font-sans); -webkit-tap-highlight-color: transparent;
}
.setting-btn:active { transform: scale(0.96); }
.setting-btn.active { border-color: var(--accent); background: var(--accent-dim); }
.setting-btn .icon { font-size: 20px; display: block; margin-bottom: 4px; }
.setting-btn .label { font-size: 11px; color: var(--text-muted); display: block; line-height: 1.3; }
.setting-btn.active .label { color: var(--accent-text); }

.tod-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.tod-btn {
  background: var(--surface); border: 0.5px solid var(--border);
  border-radius: var(--radius-sm); padding: 10px 6px;
  cursor: pointer; text-align: center; transition: all 0.15s;
  font-family: var(--font-sans); -webkit-tap-highlight-color: transparent;
}
.tod-btn:active { transform: scale(0.96); }
.tod-btn.active { border-color: var(--accent); background: var(--accent-dim); }
.tod-btn .icon { font-size: 20px; display: block; margin-bottom: 4px; }
.tod-btn .label { font-size: 11px; color: var(--text-muted); display: block; }
.tod-btn.active .label { color: var(--accent-text); }

/* Upload */
.upload-zone {
  border: 0.5px dashed var(--border-hover); border-radius: var(--radius);
  padding: 28px 20px; text-align: center; cursor: pointer;
  transition: all 0.2s; background: var(--surface);
  position: relative; overflow: hidden; -webkit-tap-highlight-color: transparent;
}
.upload-zone:active { background: var(--accent-dim); border-color: var(--accent); }
.upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; font-size: 0; }
.upload-icon { font-size: 32px; margin-bottom: 8px; }
.upload-text strong { color: var(--text); display: block; font-weight: 500; font-size: 15px; margin-bottom: 4px; }
.upload-text { font-size: 14px; color: var(--text-muted); line-height: 1.5; }
.upload-zone-sm { padding: 12px 20px; margin-top: 10px; }
.upload-zone-sm .upload-text strong { font-size: 13px; margin-bottom: 0; }
.upload-zone-sm .upload-text { font-size: 12px; }

/* Wardrobe grid */
.wardrobe-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 12px; }
.garment-card {
  aspect-ratio: 3/4; border-radius: var(--radius-sm);
  overflow: hidden; position: relative;
  border: 0.5px solid var(--border); cursor: pointer; transition: border-color 0.15s;
}
.garment-card:active { border-color: var(--accent); }
.garment-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
.garment-card .remove-btn {
  position: absolute; top: 4px; right: 4px;
  width: 22px; height: 22px;
  background: rgba(0,0,0,0.72); border: none; border-radius: 50%;
  color: #fff; font-size: 12px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent; z-index: 2;
}
.garment-label {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.82));
  padding: 18px 5px 5px; font-size: 9px;
  color: rgba(255,255,255,0.65); text-align: center;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  padding-left: 6px; padding-right: 6px;
}
.garment-category-badge {
  position: absolute; top: 4px; left: 4px;
  background: rgba(0,0,0,0.65); border-radius: 4px;
  padding: 2px 5px; font-size: 9px; color: var(--accent-text);
  text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500;
}
.garment-card.analyzing .garment-category-badge { color: var(--text-dim); }
.garment-card .edit-icon {
  position: absolute; bottom: 20px; right: 4px;
  width: 20px; height: 20px; font-size: 11px;
  background: rgba(0,0,0,0.65); border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted);
}

/* Badges / status */
.count-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 18px; height: 18px; background: var(--accent);
  color: #0f0e0d; font-size: 10px; font-weight: 500; border-radius: 50%;
}
.storage-status { display: flex; align-items: center; gap: 6px; }
.storage-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text-dim); flex-shrink: 0; transition: background 0.3s; }
.storage-dot.saved { background: var(--success); }
.storage-dot.saving { background: var(--accent); animation: pulse 0.8s ease-in-out infinite; }
.storage-label { font-size: 10px; color: var(--text-dim); }
.clear-btn {
  background: none; border: none; color: var(--text-dim); font-size: 10px;
  font-family: var(--font-sans); cursor: pointer; padding: 0;
  text-decoration: underline; text-underline-offset: 2px;
  -webkit-tap-highlight-color: transparent; letter-spacing: 1.5px; text-transform: uppercase;
}
.clear-btn:active { color: var(--danger); }

/* CTA */
.divider { height: 0.5px; background: var(--border); margin: 4px 0 20px; }
.cta-btn {
  width: 100%; padding: 15px; background: var(--accent); color: #0f0e0d;
  border: none; border-radius: var(--radius);
  font-family: var(--font-sans); font-size: 15px; font-weight: 500;
  cursor: pointer; transition: opacity 0.15s, transform 0.1s;
  letter-spacing: 0.2px; -webkit-tap-highlight-color: transparent;
}
.cta-btn:active { transform: scale(0.98); }
.cta-btn:disabled { opacity: 0.35; cursor: not-allowed; }

/* Result */
.result-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 20px; }
.result-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }
.result-title { font-family: var(--font-serif); font-size: 20px; line-height: 1.3; color: var(--accent-text); flex: 1; }
.weather-badge {
  font-size: 11px; background: var(--accent-dim); color: var(--accent-text);
  border: 0.5px solid rgba(201,169,110,0.25); border-radius: 20px;
  padding: 4px 10px; white-space: nowrap; margin-left: 10px; flex-shrink: 0; margin-top: 3px;
}
.result-body { font-size: 14px; color: var(--text-muted); line-height: 1.75; white-space: pre-wrap; }
.piece-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 14px; }
.piece-tag { font-size: 11px; background: var(--surface2); border: 0.5px solid var(--border); border-radius: 20px; padding: 4px 10px; color: var(--text-muted); }

/* Spinner */
.spinner {
  display: inline-block; width: 15px; height: 15px;
  border: 2px solid rgba(15,14,13,0.25); border-top-color: #0f0e0d;
  border-radius: 50%; animation: spin 0.7s linear infinite;
  vertical-align: -3px; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

/* Toast */
.toast {
  position: fixed; bottom: calc(88px + var(--safe-bottom)); left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: var(--surface2); border: 0.5px solid
